version: "3.9"

services:
  trade-bot:
    build: .
    restart: unless-stopped
    ports:
      - "8888:8888"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3

  prediction-bot:
    build:
      context: .
      dockerfile: prediction_bot/Dockerfile
    restart: unless-stopped
    ports:
      - "4001:4001"
    env_file:
      - .env
    volumes:
      - ./prediction_bot/data:/app/prediction_bot/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4001/api/status"]
      interval: 30s
      timeout: 10s
      retries: 3
